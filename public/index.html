<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TwoMinds</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #07090f;
      --surface:  #0d1117;
      --surface2: #131923;
      --border:   #1c2438;
      --border2:  #243048;
      --text:     #e1e7f0;
      --muted:    #5a6a82;
      --a1:       #3b82f6;
      --a1-dim:   #0d1f3c;
      --a1-glow:  rgba(59,130,246,0.18);
      --a2:       #8b5cf6;
      --a2-dim:   #1a0f3c;
      --a2-glow:  rgba(139,92,246,0.18);
      --green:    #10b981;
      --green-dim:#042f20;
      --green-lt: #6ee7b7;
      --red:      #ef4444;
      --red-dim:  #2d0a0a;
      --radius:   10px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCREENS ───────────────────────────────────────── */
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── SETUP SCREEN ──────────────────────────────────── */
    .setup-header {
      text-align: center;
      padding: 52px 24px 36px;
    }
    .setup-header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--a1) 0%, var(--a2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .setup-header p {
      color: var(--muted);
      margin-top: 10px;
      font-size: 0.95rem;
      letter-spacing: 0.1px;
    }

    .setup-main {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px 52px;
    }

    .agents-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: start;
      margin-bottom: 20px;
    }

    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .agent-card[data-agent="1"] {
      border-top: 2px solid var(--a1);
      box-shadow: 0 0 0 0 var(--a1-glow);
    }
    .agent-card[data-agent="2"] {
      border-top: 2px solid var(--a2);
      box-shadow: 0 0 0 0 var(--a2-glow);
    }
    .agent-card[data-agent="1"]:focus-within {
      border-color: var(--a1);
      box-shadow: 0 0 0 3px var(--a1-glow), 0 4px 20px rgba(0,0,0,0.4);
    }
    .agent-card[data-agent="2"]:focus-within {
      border-color: var(--a2);
      box-shadow: 0 0 0 3px var(--a2-glow), 0 4px 20px rgba(0,0,0,0.4);
    }

    .agent-card h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
      font-weight: 700;
    }
    .agent-card[data-agent="1"] h3 { color: var(--a1); }
    .agent-card[data-agent="2"] h3 { color: var(--a2); }

    label {
      display: block;
      font-size: 0.74rem;
      color: var(--muted);
      margin-bottom: 5px;
      margin-top: 14px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      font-weight: 600;
    }
    label:first-of-type { margin-top: 0; }

    input[type="text"], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.93rem;
      font-family: inherit;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--a1);
      box-shadow: 0 0 0 3px var(--a1-glow);
    }
    .agent-card[data-agent="2"] input:focus,
    .agent-card[data-agent="2"] textarea:focus {
      border-color: var(--a2);
      box-shadow: 0 0 0 3px var(--a2-glow);
    }
    textarea { min-height: 96px; }

    .vs-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 58px;
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--border2);
      letter-spacing: 3px;
    }

    .topic-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      margin-bottom: 16px;
    }
    .topic-section label { margin-top: 0; }
    .topic-section textarea { min-height: 66px; }

    .preset-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .preset-row select {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 9px 12px;
      outline: none;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .preset-row select:focus { border-color: var(--a1); }

    .config-warning {
      margin: 0 0 16px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(239,68,68,0.35);
      background: var(--red-dim);
      color: #fca5a5;
      font-size: 0.85rem;
    }

    .config-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .config-row input[type="range"] {
      flex: 1;
      accent-color: var(--a1);
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
    }
    #turns-display {
      color: var(--text);
      font-weight: 700;
      min-width: 18px;
      display: inline-block;
    }

    .start-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--a1) 0%, var(--a2) 100%);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 0.97rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.12s, box-shadow 0.15s;
      letter-spacing: 0.4px;
      box-shadow: 0 2px 16px rgba(59,130,246,0.25);
    }
    .start-btn:hover {
      opacity: 0.94;
      box-shadow: 0 4px 24px rgba(59,130,246,0.35);
      transform: translateY(-1px);
    }
    .start-btn:active { transform: scale(0.99) translateY(0); }
    .start-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; transform: none; }

    /* ── CONVERSATION SCREEN ───────────────────────────── */
    .conv-header {
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 13px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .agents-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 860px;
      margin: 0 auto;
      gap: 12px;
    }
    .agent-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.2px;
    }
    .agent-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .agent-pill.a1 { color: var(--a1); }
    .agent-pill.a1 .agent-dot { background: var(--a1); box-shadow: 0 0 6px var(--a1); }
    .agent-pill.a2 { color: var(--a2); }
    .agent-pill.a2 .agent-dot { background: var(--a2); box-shadow: 0 0 6px var(--a2); }

    .topic-title {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: 0.1px;
    }

    /* ── CHAT AREA ─────────────────────────────────────── */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    .message {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeSlideIn 0.25s ease both;
    }
    .message.a2 { flex-direction: row-reverse; }
    .message.human { justify-content: center; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.82rem;
      flex-shrink: 0;
      margin-top: 3px;
      letter-spacing: 0.3px;
    }
    .message.a1 .avatar {
      background: var(--a1-dim);
      color: var(--a1);
      border: 1.5px solid rgba(59,130,246,0.5);
      box-shadow: 0 0 10px rgba(59,130,246,0.12);
    }
    .message.a2 .avatar {
      background: var(--a2-dim);
      color: var(--a2);
      border: 1.5px solid rgba(139,92,246,0.5);
      box-shadow: 0 0 10px rgba(139,92,246,0.12);
    }
    .message.human .avatar {
      background: var(--green-dim);
      color: var(--green-lt);
      border: 1.5px solid rgba(16,185,129,0.45);
      box-shadow: 0 0 10px rgba(16,185,129,0.1);
    }

    .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 17px;
      max-width: 72%;
    }
    .message.a1 .bubble {
      border-left: 2px solid var(--a1);
      background: linear-gradient(to right, rgba(59,130,246,0.04) 0%, var(--surface) 100%);
    }
    .message.a2 .bubble {
      border-right: 2px solid var(--a2);
      background: linear-gradient(to left, rgba(139,92,246,0.04) 0%, var(--surface) 100%);
    }
    .message.human .bubble {
      border-top: 2px solid var(--green);
      max-width: 82%;
      background: linear-gradient(to bottom, rgba(16,185,129,0.04) 0%, var(--surface) 100%);
    }

    .speaker-name {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 7px;
    }
    .message.a1 .speaker-name { color: var(--a1); }
    .message.a2 .speaker-name { color: var(--a2); }
    .message.human .speaker-name { color: var(--green-lt); }

    .bubble-text {
      font-size: 0.93rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Blinking cursor while streaming */
    .message.streaming .bubble-text::after {
      content: '▋';
      opacity: 1;
      animation: blink 0.9s steps(1) infinite;
      font-size: 0.8em;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .user-composer-wrap {
      border-top: 1px solid var(--border);
      background: rgba(13,17,23,0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 24px;
    }
    .user-composer {
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .user-composer textarea {
      min-height: 42px;
      max-height: 140px;
      resize: vertical;
    }
    .send-btn {
      border: 1px solid rgba(16,185,129,0.4);
      background: rgba(16,185,129,0.12);
      color: var(--green-lt);
      border-radius: 8px;
      padding: 10px 15px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.84rem;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .send-btn:hover {
      background: rgba(16,185,129,0.2);
      border-color: rgba(16,185,129,0.6);
      box-shadow: 0 0 12px rgba(16,185,129,0.15);
    }

    /* ── STATUS BAR ────────────────────────────────────── */
    .status-bar {
      border-top: 1px solid var(--border);
      background: rgba(13,17,23,0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: sticky;
      bottom: 0;
    }
    .status-text {
      font-size: 0.83rem;
      color: var(--muted);
      letter-spacing: 0.1px;
    }
    .status-text.done { color: var(--text); }
    .status-text.error { color: #f87171; }

    .typing-dots {
      display: inline-flex;
      gap: 3px;
      margin-left: 6px;
    }
    .typing-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--muted);
      animation: dotPulse 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .new-btn {
      padding: 7px 16px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 7px;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .new-btn:hover {
      background: var(--surface2);
      border-color: var(--a1);
      color: var(--text);
    }

    .join-btn {
      padding: 7px 16px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.35);
      border-radius: 7px;
      color: var(--green-lt);
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .join-btn:hover {
      background: rgba(16,185,129,0.18);
      box-shadow: 0 0 12px rgba(16,185,129,0.15);
    }

    .stop-btn {
      padding: 7px 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.35);
      border-radius: 7px;
      color: #fca5a5;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .stop-btn:hover {
      background: rgba(239,68,68,0.18);
      box-shadow: 0 0 12px rgba(239,68,68,0.15);
    }

    .hidden { display: none !important; }

    /* Responsive */
    @media (max-width: 640px) {
      .agents-row { grid-template-columns: 1fr; }
      .vs-divider { padding-top: 0; flex-direction: row; }
      .bubble { max-width: 90%; }
    }
  </style>
</head>
<body>

<!-- ── SETUP SCREEN ───────────────────────────────────────── -->
<div id="setup-screen" class="screen active">
  <header class="setup-header">
    <h1>TwoMinds</h1>
    <p>Configure two AI personas and watch them debate any topic</p>
  </header>

  <main class="setup-main">
    <div class="agents-row">
      <!-- Agent 1 -->
      <div class="agent-card" data-agent="1">
        <h3>Agent 1</h3>
        <label>Name</label>
        <input type="text" id="a1-name" placeholder="e.g. Aristotle" value="Aristotle" />
        <label>Personality</label>
        <textarea id="a1-personality" placeholder="Describe their personality, worldview, and speaking style…">A methodical philosopher who approaches every question through careful observation and logical deduction. Values evidence, structure, and the examination of nature to understand truth. Speaks with measured precision.</textarea>
      </div>

      <div class="vs-divider">VS</div>

      <!-- Agent 2 -->
      <div class="agent-card" data-agent="2">
        <h3>Agent 2</h3>
        <label>Name</label>
        <input type="text" id="a2-name" placeholder="e.g. Nietzsche" value="Nietzsche" />
        <label>Personality</label>
        <textarea id="a2-personality" placeholder="Describe their personality, worldview, and speaking style…">A provocative and passionate thinker who challenges conventional wisdom. Believes in the power of the individual will, embraces paradox, and uses poetic, explosive language to overturn comfortable assumptions.</textarea>
      </div>
    </div>

    <!-- Topic -->
    <div class="topic-section">
      <div class="preset-row">
        <label for="scenario-preset">Scenario preset</label>
        <select id="scenario-preset">
          <option value="custom">Custom</option>
          <option value="product">Product manager vs engineer</option>
          <option value="hiring">Hiring manager vs candidate coach</option>
          <option value="startup">Founder vs investor</option>
        </select>
      </div>
      <label>Discussion Topic</label>
      <textarea id="topic" placeholder="What should they discuss?">What does it mean to live a truly good life?</textarea>
    </div>

    <p id="config-warning" class="config-warning hidden"></p>

    <!-- Turns -->
    <div class="config-row">
      <span>Number of turns: <span id="turns-display">6</span></span>
      <input type="range" id="turns-slider" min="2" max="12" value="6" step="2" />
    </div>

    <button class="start-btn" id="start-btn">Begin Discussion →</button>
  </main>
</div>


<!-- ── CONVERSATION SCREEN ────────────────────────────────── -->
<div id="conversation-screen" class="screen">
  <header class="conv-header">
    <div class="agents-header">
      <div class="agent-pill a1">
        <div class="agent-dot"></div>
        <span id="conv-a1-name">Agent 1</span>
      </div>
      <div class="topic-title" id="conv-topic">Topic</div>
      <div class="agent-pill a2">
        <span id="conv-a2-name">Agent 2</span>
        <div class="agent-dot"></div>
      </div>
    </div>
  </header>

  <div id="chat-container" class="chat-container"></div>

  <div id="user-composer-wrap" class="user-composer-wrap hidden">
    <div id="user-composer" class="user-composer hidden">
      <textarea id="user-message" placeholder="Jouw reactie... (Cmd/Ctrl + Enter om te verzenden)"></textarea>
      <button id="send-user-btn" class="send-btn">Verstuur</button>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-text" id="status-text">Starting…</span>
    <button class="join-btn hidden" id="join-btn">Praat mee</button>
    <button class="stop-btn hidden" id="stop-btn">Stop</button>
    <button class="new-btn hidden" id="new-btn">New Discussion</button>
  </div>
</div>


<script>
  // ── State ─────────────────────────────────────────────────
  let agentNames = { a1: 'Agent 1', a2: 'Agent 2' };
  let currentMessageEl = null;
  let currentTextEl = null;
  let reader = null;
  let abortController = null;
  let currentSessionId = null;
  let discussionActive = false;

  // ── DOM refs ──────────────────────────────────────────────
  const setupScreen  = document.getElementById('setup-screen');
  const convScreen   = document.getElementById('conversation-screen');
  const chatContainer = document.getElementById('chat-container');
  const statusText   = document.getElementById('status-text');
  const joinBtn      = document.getElementById('join-btn');
  const stopBtn      = document.getElementById('stop-btn');
  const newBtn       = document.getElementById('new-btn');
  const composerWrap = document.getElementById('user-composer-wrap');
  const composer     = document.getElementById('user-composer');
  const userMessage  = document.getElementById('user-message');
  const sendUserBtn  = document.getElementById('send-user-btn');
  const turnsSlider  = document.getElementById('turns-slider');
  const turnsDisplay = document.getElementById('turns-display');
  const presetSelect = document.getElementById('scenario-preset');
  const warningEl    = document.getElementById('config-warning');

  const scenarioPresets = {
    product: {
      a1Name: 'Maya (Product Manager)',
      a1Personality: 'A pragmatic product manager who anchors discussion in user pain, clear success metrics, and delivery risk. Pushes for sharp prioritization and concrete next steps.',
      a2Name: 'Jonas (Staff Engineer)',
      a2Personality: 'A thoughtful engineer focused on long-term architecture, reliability, and technical debt. Explains trade-offs clearly and challenges unrealistic timelines.',
      topic: 'Should we ship a lightweight MVP in 2 weeks, or delay 6 weeks to build a scalable foundation for onboarding 10k users?',
      turns: 8,
    },
    hiring: {
      a1Name: 'Sofia (Hiring Manager)',
      a1Personality: 'A hiring manager who values consistency, evidence, and role-fit. Wants practical interview signals and fair decision criteria.',
      a2Name: 'Ravi (Candidate Coach)',
      a2Personality: 'A candid coach advocating for candidate experience, transparency, and reducing bias while still preserving hiring quality.',
      topic: 'What is the fairest interview process for a mid-level full-stack engineer when we need to hire quickly without sacrificing quality?',
      turns: 6,
    },
    startup: {
      a1Name: 'Elena (Founder)',
      a1Personality: 'A resourceful founder obsessed with speed, distribution, and proving demand with real users before scaling spend.',
      a2Name: 'David (Seed Investor)',
      a2Personality: 'A disciplined investor focused on market size, retention signals, capital efficiency, and founder-market fit.',
      topic: 'What milestones should a B2B SaaS startup hit in the next 90 days to justify raising a seed round?',
      turns: 8,
    },
  };

  // ── Turns slider ──────────────────────────────────────────
  turnsSlider.addEventListener('input', () => {
    turnsDisplay.textContent = turnsSlider.value;
  });

  presetSelect.addEventListener('change', applyPreset);
  joinBtn.addEventListener('click', toggleComposer);
  stopBtn.addEventListener('click', stopConversation);
  sendUserBtn.addEventListener('click', sendUserTurn);
  userMessage.addEventListener('keydown', (event) => {
    if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
      event.preventDefault();
      sendUserTurn();
    }
  });

  checkConfiguration();

  // ── Start ─────────────────────────────────────────────────
  document.getElementById('start-btn').addEventListener('click', startConversation);

  async function startConversation() {
    const a1Name        = document.getElementById('a1-name').value.trim();
    const a1Personality = document.getElementById('a1-personality').value.trim();
    const a2Name        = document.getElementById('a2-name').value.trim();
    const a2Personality = document.getElementById('a2-personality').value.trim();
    const topic         = document.getElementById('topic').value.trim();
    const turns         = parseInt(turnsSlider.value, 10);

    if (!a1Name || !a2Name || !topic) {
      alert('Please fill in both agent names and the discussion topic.');
      return;
    }

    agentNames = { a1: a1Name, a2: a2Name };

    // Switch screens
    setupScreen.classList.remove('active');
    convScreen.classList.add('active');

    // Reset conversation UI
    chatContainer.innerHTML = '';
    currentSessionId = null;
    discussionActive = true;
    composerWrap.classList.remove('hidden');
    composer.classList.add('hidden');
    joinBtn.classList.remove('hidden');
    stopBtn.classList.remove('hidden');
    newBtn.classList.add('hidden');
    setStatus('Starting conversation…');

    // Kick off SSE stream via fetch
    try {
      abortController = new AbortController();
      const res = await fetch('/api/converse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: abortController.signal,
        body: JSON.stringify({
          agent1: { name: a1Name, personality: a1Personality },
          agent2: { name: a2Name, personality: a2Personality },
          topic,
          turns,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        setStatus(`Error: ${err.error}`, 'error');
        discussionActive = false;
        joinBtn.classList.add('hidden');
        composerWrap.classList.add('hidden');
        stopBtn.classList.add('hidden');
        newBtn.classList.remove('hidden');
        return;
      }

      reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6));
              handleEvent(data);
            } catch (_) { /* malformed line */ }
          }
        }
      }
    } catch (err) {
      if (err.name !== 'AbortError') {
        setStatus(`Connection error: ${err.message}`, 'error');
        newBtn.classList.remove('hidden');
      } else {
        setStatus('Discussion stopped', 'done');
        newBtn.classList.remove('hidden');
      }
    } finally {
      discussionActive = false;
      joinBtn.classList.add('hidden');
      composerWrap.classList.add('hidden');
      stopBtn.classList.add('hidden');
      abortController = null;
    }
  }

  // ── SSE event handler ─────────────────────────────────────
  function handleEvent(data) {
    switch (data.type) {
      case 'start':
        currentSessionId = data.sessionId || null;
        document.getElementById('conv-a1-name').textContent = data.agent1Name;
        document.getElementById('conv-a2-name').textContent = data.agent2Name;
        document.getElementById('conv-topic').textContent   = data.topic;
        setStatus('');
        break;

      case 'user_injected': {
        const el = createMessageEl('human', data.name || 'You', data.text || '');
        chatContainer.appendChild(el);
        setStatus('Jouw bericht is toegevoegd aan de discussie', 'done');
        scrollToBottom();
        break;
      }

      case 'turn_start': {
        // Create a new message bubble
        const el = createMessageEl(data.speaker, data.name);
        chatContainer.appendChild(el);
        currentMessageEl = el;
        currentTextEl = el.querySelector('.bubble-text');
        el.classList.add('streaming');
        setStatus(`${data.name} is thinking`, 'thinking');
        scrollToBottom();
        break;
      }

      case 'token':
        if (currentTextEl) {
          currentTextEl.textContent += data.text;
          scrollToBottom();
        }
        break;

      case 'turn_end':
        if (currentMessageEl) {
          currentMessageEl.classList.remove('streaming');
          currentMessageEl = null;
          currentTextEl = null;
        }
        setStatus('');
        break;

      case 'done':
        discussionActive = false;
        setStatus('Discussion complete', 'done');
        joinBtn.classList.add('hidden');
        composerWrap.classList.add('hidden');
        stopBtn.classList.add('hidden');
        newBtn.classList.remove('hidden');
        break;

      case 'error':
        discussionActive = false;
        setStatus(`Error: ${data.message}`, 'error');
        joinBtn.classList.add('hidden');
        composerWrap.classList.add('hidden');
        stopBtn.classList.add('hidden');
        newBtn.classList.remove('hidden');
        break;
    }
  }

  async function sendUserTurn() {
    const text = userMessage.value.trim();
    if (!text) return;
    if (!discussionActive || !currentSessionId) {
      setStatus('Je kunt nu geen bericht meer toevoegen', 'error');
      return;
    }

    sendUserBtn.disabled = true;
    try {
      const response = await fetch(`/api/converse/${encodeURIComponent(currentSessionId)}/user-turn`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: response.statusText }));
        setStatus(`Error: ${err.error}`, 'error');
        return;
      }

      userMessage.value = '';
      setStatus('Je bericht staat in de wachtrij voor de volgende beurt', 'done');
    } catch (err) {
      setStatus(`Error: ${err.message}`, 'error');
    } finally {
      sendUserBtn.disabled = false;
    }
  }

  function toggleComposer() {
    if (!discussionActive) return;
    composer.classList.toggle('hidden');
    if (!composer.classList.contains('hidden')) {
      userMessage.focus();
    }
  }

  function applyPreset() {
    const presetKey = presetSelect.value;
    if (presetKey === 'custom') return;

    const preset = scenarioPresets[presetKey];
    if (!preset) return;

    document.getElementById('a1-name').value = preset.a1Name;
    document.getElementById('a1-personality').value = preset.a1Personality;
    document.getElementById('a2-name').value = preset.a2Name;
    document.getElementById('a2-personality').value = preset.a2Personality;
    document.getElementById('topic').value = preset.topic;
    turnsSlider.value = String(preset.turns);
    turnsDisplay.textContent = String(preset.turns);
  }

  function stopConversation() {
    if (abortController) {
      abortController.abort();
    }
    if (reader) {
      try { reader.cancel(); } catch (_) {}
      reader = null;
    }
  }

  async function checkConfiguration() {
    try {
      const res = await fetch('/api/health');
      if (!res.ok) return;
      const data = await res.json();
      if (!data.configured) {
        warningEl.textContent = 'ANTHROPIC_API_KEY ontbreekt. De app start wel, maar gesprekken werken pas nadat je die environment variable hebt gezet.';
        warningEl.classList.remove('hidden');
      }
    } catch (_) {
      // Ignore health-check errors in browser; server status is shown on start.
    }
  }

  // ── Helpers ───────────────────────────────────────────────
  function createMessageEl(speaker, name, initialText = '') {
    const initial = name.charAt(0).toUpperCase();
    const el = document.createElement('div');
    el.className = `message ${speaker}`;
    el.innerHTML = `
      <div class="avatar">${initial}</div>
      <div class="bubble">
        <div class="speaker-name">${escapeHtml(name)}</div>
        <div class="bubble-text"></div>
      </div>
    `;
    el.querySelector('.bubble-text').textContent = initialText;
    return el;
  }

  function setStatus(text, type = '') {
    if (!text) {
      statusText.textContent = '';
      statusText.className = 'status-text';
      return;
    }
    if (type === 'thinking') {
      statusText.innerHTML = escapeHtml(text) +
        '<span class="typing-dots"><span></span><span></span><span></span></span>';
      statusText.className = 'status-text';
    } else {
      statusText.textContent = text;
      statusText.className = `status-text ${type}`;
    }
  }

  function scrollToBottom() {
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── New discussion ────────────────────────────────────────
  newBtn.addEventListener('click', () => {
    stopConversation();
    currentSessionId = null;
    discussionActive = false;
    joinBtn.classList.add('hidden');
    composerWrap.classList.add('hidden');
    convScreen.classList.remove('active');
    setupScreen.classList.add('active');
  });
</script>
</body>
